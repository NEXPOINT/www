<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexPoint</title>
<meta name="description" content="nexpoint.tv — coming soon.">
<meta property="og:title" content="NexPoint">
<meta property="og:description" content="nexpoint.tv — coming soon.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nexpoint.tv">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='6' y='6' width='20' height='20' rx='5' fill='none' stroke='%235a8dee' stroke-width='3'/><circle cx='16' cy='16' r='3.5' fill='%237a5cff'/></svg>">
<style>
  :root{
    --bg:#0a0b0f; --ink:#f3f5f9; --muted:#98a1b2; --line:#1c2028;
    --a1:#5a8dee; --a2:#7a5cff; --a3:#26d0ce;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; display:flex; flex-direction:column; min-height:100%;
    font:16px/1.6 system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); overflow-x:hidden}
  /* soft ambient glow behind the mark */
  body::before{content:""; position:fixed; inset:-30% -10% auto -10%; height:90vh; z-index:0; pointer-events:none;
    background:radial-gradient(38% 52% at 30% 32%, rgba(90,141,238,.20), transparent 70%),
      radial-gradient(36% 48% at 72% 40%, rgba(122,92,255,.16), transparent 70%),
      radial-gradient(40% 52% at 54% 78%, rgba(38,208,206,.12), transparent 72%); filter:blur(10px)}
  main{position:relative; z-index:1; flex:1; display:flex; flex-direction:column; justify-content:center;
    width:100%; max-width:820px; margin:0 auto; padding:0 24px}
  .eyebrow{font-size:13px; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); margin:0 0 20px}
  h1{margin:0; line-height:.94; font-weight:800; letter-spacing:-.035em; font-size:clamp(52px,14vw,132px);
    background:linear-gradient(100deg,var(--a1),var(--a3),var(--a2),var(--a1)); background-size:280% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent; animation:shift 9s ease-in-out infinite}
  @keyframes shift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @media(prefers-reduced-motion:reduce){h1{animation:none}}
  .tag{font-size:clamp(18px,2.6vw,24px); color:#e6eaf2; font-weight:600; margin:26px 0 0}
  .sub{color:var(--muted); margin:14px 0 0; max-width:52ch}
  .mail{display:inline-flex; gap:9px; align-items:center; margin-top:34px; text-decoration:none;
    font-family:ui-monospace,Menlo,monospace; font-size:15px; color:#fff;
    background:linear-gradient(100deg,var(--a1),var(--a2)); border-radius:10px; padding:12px 19px; font-weight:600; width:max-content}
  .mail:hover{filter:brightness(1.08)}
  footer{position:relative; z-index:1; width:100%; max-width:820px; margin:0 auto; padding:26px 24px;
    color:var(--muted); font-size:14px; display:flex; gap:8px 18px; flex-wrap:wrap; justify-content:space-between}
  footer a{color:var(--muted); text-decoration:none} footer a:hover{color:var(--ink)}
  .mono{font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>

<main>
  <p class="eyebrow">nexpoint.tv</p>
  <h1>NexPoint</h1>
  <p class="tag">Coming soon.</p>
  <p class="sub">This site is under construction. Reach us in the meantime and we'll be in touch.</p>
  <a class="mail" href="mailto:hello@nexpoint.tv">hello@nexpoint.tv →</a>
</main>

<footer>
  <span>© NexPoint</span>
  <a class="mono" href="mailto:hello@nexpoint.tv">hello@nexpoint.tv</a>
</footer>

</body>
</html>
